name: Generate API Documentation to Wiki

on:
  push:
    branches:
      - master
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-document:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: ./main-repo

      - name: Checkout Wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: ./wiki

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' 
          
      - name: Build Project
        run: dotnet build ./main-repo/SHTCGClient/SHTCGClient.csproj --configuration Release -p:GenerateDocumentationFile=true

      - name: Install XMLDoc2Markdown
        run: dotnet tool install -g XMLDoc2Markdown
        
      - name: Generate Docs
        run: xmldoc2md ./main-repo/SHTCGClient/bin/Release/net10.0/SHTCGClient.dll -o ./wiki --github-pages

      - name: Commit and Push to Wiki
        run: |
          cd ./wiki
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # Only commit if there are actually changes
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-update API documentation"
          git push
